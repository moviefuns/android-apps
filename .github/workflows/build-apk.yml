name: Android CI (Build nota subdirectory)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 这里改成了 java-version: '8'，完美兼容老版 Gradle
      - name: set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x nota/gradlew

      - name: Build with Gradle in nota folder
        run: |
          cd nota
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nota-app
          path: nota/app/build/outputs/apk/debug/*.apk

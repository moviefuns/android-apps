name: Android CI (Build nota subdirectory)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x nota/gradlew

      - name: Force Create Cert File
        run: |
          mkdir -p nota/app/src/main/res/raw
          echo "-----BEGIN CERTIFICATE-----" > nota/app/src/main/res/raw/cert.pem
          echo "MIIDHDCCAgSgAwIBAgIJALCbRjjHmFn/MA0GCSqGSIb3DQEBCwUAMBoxGDAWBgNV" >> nota/app/src/main/res/raw/cert.pem
          echo "BAMMD25leHRxdW91ZC5sb2NhbDAeFw0xNzA2MDYxMTI0MjBaFw0yNzA2MDYxMTI0" >> nota/app/src/main/res/raw/cert.pem
          echo "MjBaMBoxGDAWBgNVBAMMD25leHRxdW91ZC5sb2NhbDCCASIwDQYJKoZIhvcNAQEB" >> nota/app/src/main/res/raw/cert.pem
          echo "BQADggEPADCCAQoCggEBALnq2OJ5Bj0SUGkHI6Pq3po/oFYu5ZpfV9Hdgr1wz7+N" >> nota/app/src/main/res/raw/cert.pem
          echo "CvHer386mxMizIg/h9etz95Z5WeRTQ5fAEmLiTGoFzy095nIsOZ3NkhZO5QFnpfY" >> nota/app/src/main/res/raw/cert.pem
          echo "oTMyP8LmcqMoGCx1/uh6BkIyPSZezUIOnpzl0n59XX5IZ2M2znl7SCyz3anhQYNf" >> nota/app/src/main/res/raw/cert.pem
          echo "/BMol1pcQpmqnZ3QyOSxgPHknhR3ux7jxW2hyyggVqPm3x8CchrOHFc6jpakTAFx" >> nota/app/src/main/res/raw/cert.pem
          echo "voYx1ISyFcX41Q7YIaTvTg7QKm8oEzLxdZytGAQFVzPpLWaj7IMMbbL8hIYFI+1j" >> nota/app/src/main/res/raw/cert.pem
          echo "64yDBoPEvk/XIAlt4sy/Z4b85+vOhh/x3HCpgQIBkSMCAwEAAaNlMGMwCQYDVR0T" >> nota/app/src/main/res/raw/cert.pem
          echo "BAIwADAdBgNVHSUEFjAUBggrBgEFBQcDAQYIKwYBBQUHAwIwNwYDVR0RBDAwLoIP" >> nota/app/src/main/res/raw/cert.pem
          echo "bmV4dGNsb3VkLmxvY2FsggVsb2NhbIIJbmV4dGNsb3Vkgglsb2NhbGhvc3QwDQYJ" >> nota/app/src/main/res/raw/cert.pem
          echo "KoZIhvcNAQELBQADggEBABDuYl+pGTlAw8fo7RVjpQezBFsDdWNcCzApynk/48WP" >> nota/app/src/main/res/raw/cert.pem
          echo "lactcxb3KUQHSes5BjUPLSUN1fYAsUZP5h4IA0lA3urs8QM/pwe0DiggBtW4G1Tu" >> nota/app/src/main/res/raw/cert.pem
          echo "OuRKnKK2ndb6mFaeY43AiYKa7RQW5zKdoetfbhQp4EG8k3G5AB+Mu/3xL+RvnBzn" >> nota/app/src/main/res/raw/cert.pem
          echo "l9NKsjurcZKaI/TYTyKpXKHUT4ecTM3JuisOKiCc8kjTaH3SaLINDdtxdtrrStRe" >> nota/app/src/main/res/raw/cert.pem
          echo "bJURqxSfS7mIGec1fsWlMiKvEOTAC00Kyk8URGcUCkKRGRJMcFvugnk6oclfUaeX" >> nota/app/src/main/res/raw/cert.pem
          echo "KU6JN6mNiufHiQoi07OA+9Uza/U4A8X40vfqLXpvENw=" >> nota/app/src/main/res/raw/cert.pem
          echo "-----END CERTIFICATE-----" >> nota/app/src/main/res/raw/cert.pem

      - name: Build with Gradle in nota folder
        working-directory: ./nota
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nota-app
          path: nota/app/build/outputs/apk/debug/*.apk

name: Android CI (Build nota subdirectory)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x nota/gradlew

      - name: Force Create Cert File
        run: |
          mkdir -p nota/app/src/main/res/raw

      - name: Build with Gradle in nota folder
        working-directory: ./nota
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nota-app
          path: nota/app/build/outputs/apk/debug/*.apk
